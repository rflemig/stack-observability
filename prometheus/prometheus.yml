global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "spring-boot-app"
    metrics_path: '/actuator/prometheus' 
    static_configs:
      - targets: ["host.docker.internal:8080"]
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
